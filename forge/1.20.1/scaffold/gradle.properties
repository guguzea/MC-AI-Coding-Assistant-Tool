# Forge Gradle Memory — 3 GB minimum, decompilation is memory-intensive
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# ---- Minecraft / Forge 版本（必须与 Forge 版本匹配）----
minecraft_version=1.20.1
minecraft_version_range=[1.20.1,1.21)

forge_version=47.4.18
forge_version_range=[47,)
loader_version_range=[47,)

# ---- Mappings（默认 official = MCP；改为 parchment 可获命名参数）----
# official: Mojang 混淆名（无参数名）
# parchment: 社区维护的带参数名和 javadoc 的映射层
mapping_channel=official
mapping_version=20231030.163645

# ---- Mod 元数据（修改这些值以匹配你的模组）----
mod_id=examplemod
mod_name=Example Mod
mod_license=All Rights Reserved
mod_version=1.0.0
mod_group_id=com.example.examplemod
mod_authors=YourNameHere
mod_description=Example mod description.\nAdd lines as needed.
